<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Events | Coordinator</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header"><a href="../../index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;"><div class="logo-icon"><i class='bx bxs-graduation'></i></div><h2>AlumniPortal</h2></a></div>
            <div class="sidebar-user"><div class="sidebar-user-card" style="border-left:3px solid #0d9488;"><img src="https://i.pravatar.cc/150?img=47" id="sidebarAvatar" alt="User"><div class="user-meta"><h4 id="sidebarName">Loading...</h4><span style="color:#0d9488;font-weight:600;">Dept. Coordinator</span></div></div></div>
            <nav class="dash-nav">
                <span class="nav-section-label">Department</span>
                <a href="dashboard.html" class="dash-nav-link"><i class='bx bxs-dashboard'></i><span>Overview</span></a>
                <a href="alumni.html" class="dash-nav-link"><i class='bx bxs-user-detail'></i><span>Alumni</span></a>
                <a href="mentors.html" class="dash-nav-link"><i class='bx bxs-user-voice'></i><span>Mentors</span></a>
                <span class="nav-section-label">Actions</span>
                <a href="jobs.html" class="dash-nav-link"><i class='bx bxs-briefcase'></i><span>Job Approvals</span></a>
                <a href="top-alumni.html" class="dash-nav-link"><i class='bx bxs-trophy'></i><span>Suggest Top Alumni</span></a>
                <a href="events.html" class="dash-nav-link active"><i class='bx bxs-calendar-event'></i><span>Events</span></a>
                <span class="nav-section-label">Communication</span>
                <a href="chat.html" class="dash-nav-link"><i class='bx bxs-message-dots'></i><span>Messages</span></a>
                <a href="notifications.html" class="dash-nav-link"><i class='bx bxs-bell-ring'></i><span>Announcements</span></a>
                <span class="nav-section-label">Account</span>
                <a href="settings.html" class="dash-nav-link"><i class='bx bxs-cog'></i><span>Settings</span></a>
            </nav>
            <div class="dash-sidebar-footer"><a href="#" class="dash-nav-link" id="logoutBtn"><i class='bx bx-log-out'></i><span>Logout</span></a></div>
        </aside>
        <main class="dash-main">
            <header class="dash-topbar"><div style="display:flex;align-items:center;gap:16px;"><button class="sidebar-toggle" onclick="document.getElementById('dashSidebar').classList.toggle('open')"><i class='bx bx-menu'></i></button></div><div class="dash-topbar-actions"><div class="topbar-profile"><img src="https://i.pravatar.cc/150?img=47" id="topAvatar" alt="Profile"><span id="topName">User</span><i class='bx bx-chevron-down'></i></div></div></header>
            <div class="dash-view" style="opacity:1;transform:translateY(0);">
                <div class="page-title-bar">
                    <div><h1>📅 Department Events</h1><p>Manage and create events specifically for <span id="pageDeptName" style="color:var(--primary);font-weight:700;"></span>.</p></div>
                    <button class="btn btn-primary btn-sm" onclick="showToast('Create Event module coming soon!','info')"><i class='bx bx-plus'></i> Create New Event</button>
                </div>
                
                <div id="eventsContainer"></div>

            </div>
        </main>
    </div>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script>
        const user = getUser(); if (!user || user.role !== 'coordinator') window.location.href = '../auth/login.html';
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); clearUser(); showToast('Logged out','info'); setTimeout(()=>window.location.href='../../index.html',1000); });
        document.getElementById('sidebarName').textContent = user.name;
        document.getElementById('topName').textContent = user.name;
        document.getElementById('pageDeptName').textContent = user.department;
        const dept = APP_DATA.departments.find(d => d.name === user.department);
        if(dept) { document.getElementById('sidebarAvatar').src = dept.coordinatorAvatar; document.getElementById('topAvatar').src = dept.coordinatorAvatar; }

        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        // In a real app we'd filter by department, but our mock data events don't have department field. Let's just show all events as dummy.
        document.getElementById('eventsContainer').innerHTML = APP_DATA.events.map(ev => {
            const d = new Date(ev.date); const day = d.getDate().toString().padStart(2,'0'); const month = months[d.getMonth()];
            return `<div class="dash-section" style="margin-bottom:16px;">
                <div class="dash-section-body" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                    <div style="min-width:65px;text-align:center;background:rgba(13, 148, 136, 0.1);color:#0d9488;border-radius:12px;padding:10px;"><div style="font-size:11px;font-weight:700;text-transform:uppercase;">${month}</div><div style="font-size:24px;font-weight:800;line-height:1;">${day}</div></div>
                    <div style="flex:1;min-width:200px;"><h4 style="font-size:16px;font-weight:700;margin-bottom:4px;">${ev.title}</h4><p style="font-size:13px;color:var(--text-muted);margin-bottom:4px;"><i class='bx bx-map'></i> ${ev.location} · <i class='bx bx-time-five'></i> ${ev.time}</p><p style="font-size:13px;color:var(--text-secondary);">${ev.description}</p></div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="btn btn-secondary btn-sm" onclick="showToast('Sending event reminder...','success')"><i class='bx bx-bell'></i> Notify Alumni</button>
                        <button class="btn btn-secondary btn-sm" onclick="showToast('Editing event...','info')"><i class='bx bx-edit'></i> Edit</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    </script>
</body>
</html>
