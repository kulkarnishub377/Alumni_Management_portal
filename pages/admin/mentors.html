<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Management | Admin Portal</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .mentor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .mentor-card-admin { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; transition: var(--transition); }
        .mentor-card-admin:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--primary); }
        .mentor-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .mentor-card-top img { width: 56px; height: 56px; border-radius: 50%; }
        .mentor-card-top h4 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .mentor-card-top p { font-size: 12px; color: var(--text-muted); }
        .mentor-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .mentor-meta span { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--bg-body); color: var(--text-secondary); border: 1px solid var(--border); }
        .mentor-card-actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header"><a href="../../index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;"><div class="logo-icon"><i class='bx bxs-graduation'></i></div><h2>AlumniPortal</h2></a></div>
            <div class="sidebar-user"><div class="sidebar-user-card"><img src="https://ui-avatars.com/api/?name=Admin&background=ef4444&color=fff" alt="Admin"><div class="user-meta"><h4>Principal Admin</h4><span>Super Administrator</span></div></div></div>
            <nav class="dash-nav">
                <span class="nav-section-label">Overview</span>
                <a href="dashboard.html" class="dash-nav-link"><i class='bx bxs-dashboard'></i><span>Dashboard</span></a>
                <a href="departments.html" class="dash-nav-link"><i class='bx bxs-building-house'></i><span>Departments</span></a>
                <span class="nav-section-label">Management</span>
                <a href="users.html" class="dash-nav-link"><i class='bx bxs-group'></i><span>All Users</span></a>
                <a href="mentors.html" class="dash-nav-link active"><i class='bx bxs-user-voice'></i><span>Mentors</span></a>
                <a href="alumni.html" class="dash-nav-link"><i class='bx bxs-user-detail'></i><span>Alumni</span></a>
                <a href="top-alumni.html" class="dash-nav-link"><i class='bx bxs-trophy'></i><span>Top Alumni</span></a>
                <span class="nav-section-label">Content</span>
                <a href="events.html" class="dash-nav-link"><i class='bx bxs-calendar-event'></i><span>Events</span></a>
                <a href="jobs.html" class="dash-nav-link"><i class='bx bxs-briefcase'></i><span>Job Board</span></a>
                <span class="nav-section-label">Communication</span>
                <a href="chat.html" class="dash-nav-link"><i class='bx bxs-message-dots'></i><span>Messages</span></a>
                <a href="notifications.html" class="dash-nav-link"><i class='bx bxs-bell-ring'></i><span>Notifications</span></a>
                <span class="nav-section-label">System</span>
                <a href="settings.html" class="dash-nav-link"><i class='bx bxs-cog'></i><span>Settings</span></a>
            </nav>
            <div class="dash-sidebar-footer"><a href="#" class="dash-nav-link" id="logoutBtn"><i class='bx bx-log-out'></i><span>Logout</span></a></div>
        </aside>
        <main class="dash-main">
            <header class="dash-topbar">
                <div style="display:flex;align-items:center;gap:16px;">
                    <button class="sidebar-toggle" onclick="document.getElementById('dashSidebar').classList.toggle('open')"><i class='bx bx-menu'></i></button>
                    <div class="dash-search"><i class='bx bx-search'></i><input type="text" placeholder="Search mentors..." id="mentorSearch" oninput="filterMentors()"></div>
                </div>
                <div class="dash-topbar-actions">
                    <button class="topbar-icon-btn" onclick="window.location.href='notifications.html'"><i class='bx bxs-bell'></i><span class="notif-dot"></span></button>
                    <div class="topbar-profile"><img src="https://ui-avatars.com/api/?name=Admin&background=ef4444&color=fff" alt="Admin"><span>Admin</span><i class='bx bx-chevron-down'></i></div>
                </div>
            </header>
            <div class="dash-view" style="opacity:1;transform:translateY(0);">
                <div class="page-title-bar">
                    <div><h1>🧑‍🏫 Mentor Management</h1><p>View and manage all batch mentors across departments.</p></div>
                    <button class="btn btn-primary btn-sm" onclick="showToast('Add Mentor modal coming soon!', 'info')"><i class='bx bx-plus'></i> Add Mentor</button>
                </div>
                <div class="filter-bar" style="margin-bottom:24px;">
                    <div class="filter-input"><i class='bx bx-search'></i><input type="text" placeholder="Search by name or specialization..." id="mentorSearchMain" oninput="filterMentors()"></div>
                    <select id="deptFilter" onchange="filterMentors()"><option value="">All Departments</option></select>
                </div>
                <div class="mentor-grid" id="mentorGrid"></div>
            </div>
        </main>
    </div>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script>
        const user = getUser(); if (!user || !user.loggedIn || user.role !== 'admin') window.location.href = '../auth/login.html';
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); clearUser(); showToast('Logged out','info'); setTimeout(()=>window.location.href='../../index.html',1000); });

        // Populate dept filter
        const deptFilter = document.getElementById('deptFilter');
        [...new Set(APP_DATA.mentors.map(m => m.department))].sort().forEach(d => {
            deptFilter.innerHTML += `<option value="${d}">${d}</option>`;
        });

        function renderMentors(list) {
            document.getElementById('mentorGrid').innerHTML = list.map(m => `
                <div class="mentor-card-admin" data-name="${m.name.toLowerCase()}" data-dept="${m.department}" data-spec="${m.specialization.toLowerCase()}">
                    <div class="mentor-card-top">
                        <img src="${m.avatar}" alt="${m.name}">
                        <div>
                            <h4>${m.name}</h4>
                            <p>${m.department}</p>
                        </div>
                    </div>
                    <div class="mentor-meta">
                        <span><i class='bx bx-book-open' style="font-size:12px;"></i> ${m.specialization}</span>
                        <span><i class='bx bx-group' style="font-size:12px;"></i> ${m.alumniCount} Alumni</span>
                        ${m.batches.map(b => `<span>Batch ${b}</span>`).join('')}
                    </div>
                    <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">
                        <i class='bx bx-envelope'></i> ${m.email}<br>
                        <i class='bx bx-phone'></i> ${m.phone}
                    </div>
                    <div class="mentor-card-actions">
                        <button class="btn btn-secondary btn-sm" onclick="showToast('Editing ${m.name}...','info')"><i class='bx bx-edit'></i> Edit</button>
                        <button class="btn btn-secondary btn-sm" onclick="showToast('Reassigning batches...','info')"><i class='bx bx-transfer'></i> Reassign</button>
                    </div>
                </div>
            `).join('');
        }
        renderMentors(APP_DATA.mentors);

        function filterMentors() {
            const search = (document.getElementById('mentorSearchMain')?.value || '').toLowerCase();
            const dept = deptFilter.value;
            const filtered = APP_DATA.mentors.filter(m => {
                const matchSearch = !search || m.name.toLowerCase().includes(search) || m.specialization.toLowerCase().includes(search);
                const matchDept = !dept || m.department === dept;
                return matchSearch && matchDept;
            });
            renderMentors(filtered);
        }
    </script>
</body>
</html>
