<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Alumni | Mentor</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header"><a href="../../index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;"><div class="logo-icon"><i class='bx bxs-graduation'></i></div><h2>AlumniPortal</h2></a></div>
            <div class="sidebar-user"><div class="sidebar-user-card" style="border-left:3px solid #4f46e5;"><img src="https://ui-avatars.com/api/?name=PM&background=4f46e5&color=fff" id="sidebarAvatar" alt="User"><div class="user-meta"><h4 id="sidebarName">Loading...</h4><span style="color:#4f46e5;font-weight:600;">Batch Mentor</span></div></div></div>
            <nav class="dash-nav">
                <span class="nav-section-label">My Batches</span>
                <a href="dashboard.html" class="dash-nav-link"><i class='bx bxs-dashboard'></i><span>Overview</span></a>
                <a href="approvals.html" class="dash-nav-link"><i class='bx bxs-user-plus'></i><span>Approvals</span></a>
                <a href="alumni.html" class="dash-nav-link active"><i class='bx bxs-user-detail'></i><span>Batch Alumni</span></a>
                <span class="nav-section-label">Activity</span>
                <a href="events.html" class="dash-nav-link"><i class='bx bxs-calendar-event'></i><span>Events</span></a>
                <a href="chat.html" class="dash-nav-link"><i class='bx bxs-message-dots'></i><span>Messages</span></a>
                <span class="nav-section-label">Account</span>
                <a href="settings.html" class="dash-nav-link"><i class='bx bxs-cog'></i><span>Settings</span></a>
            </nav>
            <div class="dash-sidebar-footer"><a href="#" class="dash-nav-link" id="logoutBtn"><i class='bx bx-log-out'></i><span>Logout</span></a></div>
        </aside>
        <main class="dash-main">
            <header class="dash-topbar"><div style="display:flex;align-items:center;gap:16px;"><button class="sidebar-toggle" onclick="document.getElementById('dashSidebar').classList.toggle('open')"><i class='bx bx-menu'></i></button><div class="dash-search"><i class='bx bx-search'></i><input type="text" placeholder="Search my batches..."></div></div><div class="dash-topbar-actions"><div class="topbar-profile"><img src="https://ui-avatars.com/api/?name=PM&background=4f46e5&color=fff" id="topAvatar" alt="Profile"><span id="topName">User</span><i class='bx bx-chevron-down'></i></div></div></header>
            <div class="dash-view" style="opacity:1;transform:translateY(0);">
                <div class="page-title-bar">
                    <div><h1>🎓 My Batch Alumni</h1><p>View and manage the alumni assigned to your batches.</p></div>
                    <button class="btn btn-secondary btn-sm" onclick="showToast('Exporting batch roster...','info')"><i class='bx bx-download'></i> Export Roster</button>
                </div>
                <div class="dash-stats-row" style="margin-bottom:24px;">
                    <div class="dash-stat-card"><div class="stat-icon purple"><i class='bx bxs-graduation'></i></div><div class="stat-info"><h3 id="statTotalStudents">0</h3><p>Total Graduates</p></div></div>
                    <div class="dash-stat-card"><div class="stat-icon green"><i class='bx bxs-briefcase-alt-2'></i></div><div class="stat-info"><h3 id="statEmployed">0%</h3><p>Placement Rate</p></div></div>
                    <div class="dash-stat-card"><div class="stat-icon blue"><i class='bx bxs-book-reader'></i></div><div class="stat-info"><h3 id="statHigherEd">0%</h3><p>Higher Education</p></div></div>
                </div>
                
                <div class="filter-bar" style="margin-bottom:24px;">
                    <div class="filter-input"><i class='bx bx-search'></i><input type="text" placeholder="Search by name, company..." id="alumniSearch" oninput="filterAlumni()"></div>
                    <select class="form-control" id="batchFilterAlumni" onchange="filterAlumni()" style="width:150px;"><option value="">All My Batches</option></select>
                    <button class="btn btn-primary" style="background:#4f46e5; border:none;" onclick="showToast('Messaging filtered group...','info')"><i class='bx bxs-paper-plane'></i> Message Group</button>
                </div>
                <div class="network-grid" id="alumniGrid"></div>

            </div>
        </main>
    </div>
    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script>
        const user = getUser(); if (!user || user.role !== 'mentor') window.location.href = '../auth/login.html';
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); clearUser(); showToast('Logged out','info'); setTimeout(()=>window.location.href='../../index.html',1000); });
        
        document.getElementById('sidebarName').textContent = user.name;
        document.getElementById('topName').textContent = user.name;
        const mentorInfo = APP_DATA.mentors.find(m => m.name === user.name);
        if(mentorInfo) { document.getElementById('sidebarAvatar').src = mentorInfo.avatar; document.getElementById('topAvatar').src = mentorInfo.avatar; }

        let assignedBatches = mentorInfo ? mentorInfo.batches : [];
        let myAlumni = APP_DATA.topAlumni.filter(a => assignedBatches.includes(a.batch));

        assignedBatches.sort((a,b) => b-a).forEach(b => document.getElementById('batchFilterAlumni').innerHTML += `<option value="${b}">${b}</option>`);

        function renderAlumniCards(list) {
            document.getElementById('statTotalStudents').textContent = list.length * 12; // Dummy math
            document.getElementById('statEmployed').textContent = list.length > 0 ? '88%' : '0%';
            document.getElementById('statHigherEd').textContent = list.length > 0 ? '12%' : '0%';

            document.getElementById('alumniGrid').innerHTML = list.length ? list.map(a => `
                <div class="network-card" style="transition:all 0.3s; border:1px solid var(--border);" onmouseover="this.style.borderColor='#4f46e5';this.style.transform='translateY(-3px)';" onmouseout="this.style.borderColor='var(--border)';this.style.transform='translateY(0)';">
                    <img src="${a.avatar}" alt="${a.name}" style="width:64px;height:64px;border-radius:50%;border:2px solid #e2e8f0;padding:2px;">
                    <div class="nc-info" style="flex:1;">
                        <h4 style="font-size:16px;font-weight:700;">${a.name}</h4><p style="color:var(--primary);font-weight:600;">${a.role} at ${a.company}</p>
                        <div style="display:flex;gap:8px;margin-top:8px;">
                            <span class="nc-batch" style="background:rgba(79,70,229,0.1);color:#4f46e5;">Batch ${a.batch}</span>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        <button class="topbar-icon-btn" style="background:rgba(79,70,229,0.1);color:#4f46e5;border-radius:8px;" title="View Transcript" onclick="showToast('Loading academic record...','info')"><i class='bx bx-id-card'></i></button>
                        <button class="topbar-icon-btn" style="border-radius:8px;" title="Message Alumni" onclick="showToast('Opening fast-chat...','info')"><i class='bx bxs-message-rounded'></i></button>
                    </div>
                </div>
            `).join('') : '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:40px;border:1px dashed var(--border);border-radius:var(--radius-lg);">No alumni found in your assigned batches.</p>';
        }
        renderAlumniCards(myAlumni);

        function filterAlumni() {
            const search = (document.getElementById('alumniSearch')?.value || '').toLowerCase();
            const batch = document.getElementById('batchFilterAlumni')?.value || '';
            const filtered = myAlumni.filter(a => {
                const matchSearch = !search || a.name.toLowerCase().includes(search) || a.company.toLowerCase().includes(search);
                const matchBatch = !batch || a.batch === batch;
                return matchSearch && matchBatch;
            });
            renderAlumniCards(filtered);
        }
    </script>
</body>
</html>
