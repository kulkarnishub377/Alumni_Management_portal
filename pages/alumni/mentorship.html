<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentorship | Alumni Management Portal</title>
    <meta name="description" content="Alumni Dashboard - Manage your profile, network with alumni, chat with batchmates, and explore opportunities.">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
/* ===== MENTORSHIP PAGE INTERNAL OVERRIDES ===== */
.page-title-bar { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; margin-bottom:24px; }
.page-title-bar h1 { font-size:28px; font-weight:800; display:flex; align-items:center; }
.page-title-bar p { color:var(--text-secondary); font-size:14px; margin-top:4px; }

/* Mentor Hero Card */
.mentor-hero-card { position:relative; border-radius:var(--radius-lg); background:var(--bg-card); border:1px solid var(--border); overflow:hidden; margin-bottom:24px; }
.mentor-hero-bg { position:absolute; top:0; left:0; right:0; height:100px; background:linear-gradient(135deg, #4f46e5, #7c3aed, #0ea5e9); }
.mentor-hero-content { position:relative; z-index:2; display:flex; align-items:flex-start; gap:24px; padding:32px 32px 28px; }
.mentor-hero-avatar { width:100px; height:100px; border-radius:50%; border:4px solid var(--bg-card); box-shadow:var(--shadow-md); margin-top:20px; flex-shrink:0; }
.mentor-hero-info { padding-top:60px; flex:1; min-width:0; }
.mentor-hero-name { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.mentor-hero-name h2 { font-size:22px; font-weight:800; }
.mentor-verified { color:var(--primary); font-size:20px; }
.mentor-hero-role { color:var(--primary); font-size:15px; font-weight:600; margin-bottom:4px; }
.mentor-hero-sub { color:var(--text-muted); font-size:13px; margin-bottom:16px; }
.mentor-hero-stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.mhs-item { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--text-secondary); padding:6px 14px; border-radius:20px; background:var(--bg-body); border:1px solid var(--border); }
.mhs-item i { color:var(--primary); font-size:14px; }
.mentor-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Stats Row */
.mentorship-stats-row { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:24px; }
.ms-stat-card { display:flex; align-items:center; gap:14px; padding:20px; border-radius:var(--radius-lg); background:var(--bg-card); border:1px solid var(--border); transition:all 0.2s; }
.ms-stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.ms-stat-icon { width:48px; height:48px; min-width:48px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:22px; }
.ms-stat-icon.green { background:#dcfce7; color:#16a34a; }
.ms-stat-icon.blue { background:#e0f2fe; color:#0ea5e9; }
.ms-stat-icon.purple { background:#eef2ff; color:#4f46e5; }
.ms-stat-icon.amber { background:#fef3c7; color:#d97706; }
.ms-stat-info h3 { font-size:22px; font-weight:800; line-height:1; }
.ms-stat-info p { font-size:12px; color:var(--text-muted); font-weight:500; margin-top:4px; }

/* Announcements */
.announcement-list { display:flex; flex-direction:column; }
.announcement-item { display:flex; align-items:flex-start; gap:14px; padding:20px 24px; border-bottom:1px solid var(--border); transition:background 0.2s; }
.announcement-item:last-child { border-bottom:none; }
.announcement-item:hover { background:rgba(79,70,229,0.03); }
.ann-icon { width:40px; height:40px; min-width:40px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.ann-icon.blue { background:#e0f2fe; color:#0ea5e9; }
.ann-icon.green { background:#dcfce7; color:#16a34a; }
.ann-icon.amber { background:#fef3c7; color:#d97706; }
.ann-content { flex:1; min-width:0; }
.ann-content h4 { font-size:14px; font-weight:700; margin-bottom:4px; }
.ann-content p { font-size:13px; color:var(--text-secondary); line-height:1.5; margin-bottom:6px; }
.ann-time { font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
.ann-badge { flex-shrink:0; padding:4px 10px; border-radius:12px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; align-self:flex-start; }
.ann-badge.new { background:rgba(79,70,229,0.12); color:var(--primary); }

/* Premium Table */
.premium-table { width:100%; border-collapse:collapse; }
.premium-table thead tr { border-bottom:2px solid var(--border); }
.premium-table th { padding:14px 16px; text-align:left; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.2px; }
.premium-table td { padding:14px 16px; font-size:14px; }
.premium-table tbody tr { border-bottom:1px solid var(--border); }
.premium-table tbody tr:last-child { border-bottom:none; }
.premium-table tbody tr:hover { background:rgba(79,70,229,0.03); }
.status-badge { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:4px 10px; border-radius:12px; }
.status-badge.upcoming { color:#10b981; background:rgba(16,185,129,0.1); }
.status-badge.planned { color:#f59e0b; background:rgba(245,158,11,0.1); }
.status-badge.completed { color:var(--text-muted); background:var(--bg-body); }

/* Resource Cards */
.resource-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; }
.resource-card { padding:24px; border-radius:var(--radius-lg); background:var(--bg-body); border:1px solid var(--border); text-align:center; cursor:pointer; transition:all 0.2s; }
.resource-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--primary); }
.rc-icon { width:52px; height:52px; border-radius:var(--radius-md); background:rgba(79,70,229,0.1); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 12px; }
.resource-card h4 { font-size:14px; font-weight:700; margin-bottom:4px; }
.resource-card p { font-size:12px; color:var(--text-muted); }

/* Table Responsive */
.table-responsive { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }

@media(max-width:1024px) {
    .mentorship-stats-row { grid-template-columns:repeat(2, 1fr); }
    .resource-grid { grid-template-columns:repeat(2, 1fr); }
}
@media(max-width:768px) {
    .page-title-bar h1 { font-size:22px; }
    .mentor-hero-content { flex-direction:column; align-items:center; text-align:center; padding:20px 16px; }
    .mentor-hero-info { padding-top:16px; }
    .mentor-hero-name { justify-content:center; }
    .mentor-hero-stats { justify-content:center; }
    .mentor-hero-avatar { margin-top:40px; width:80px; height:80px; }
    .mentor-actions { justify-content:center; }
    .mentorship-stats-row { grid-template-columns:1fr 1fr; }
    .resource-grid { grid-template-columns:1fr 1fr; }
    .announcement-item { padding:16px; }
    .ms-stat-card { padding:16px; }
    .premium-table th, .premium-table td { padding:10px 12px; font-size:13px; }
}
@media(max-width:480px) {
    .mentorship-stats-row { grid-template-columns:1fr; }
    .resource-grid { grid-template-columns:1fr; }
    .mentor-hero-bg { height:80px; }
    .mentor-hero-stats { flex-direction:column; align-items:stretch; }
    .mhs-item { justify-content:center; }
    .mentor-actions { flex-direction:column; }
    .mentor-actions .btn { width:100%; justify-content:center; }
}
</style>
</head>
<body>

    <div class="dashboard-layout">

        <!-- ========== SIDEBAR ========== -->
        <aside class="dash-sidebar" id="dashSidebar">
            <div class="dash-sidebar-header">
                <a href="../../index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
                    <div class="logo-icon"><i class='bx bxs-graduation'></i></div>
                    <h2>AlumniPortal</h2>
                </a>
            </div>

            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <img src="https://i.pravatar.cc/150?img=3" alt="User Avatar" id="sidebarAvatar">
                    <div class="user-meta">
                        <h4 id="sidebarUserName">Shubham K.</h4>
                        <span id="sidebarUserRole">Alumni • Batch 2020</span>
                    </div>
                </div>
            </div>

            <nav class="dash-nav">
                <span class="nav-section-label">Main</span>
                <a href="dashboard.html" class="dash-nav-link active" data-view="overview">
                    <i class='bx bxs-dashboard'></i>
                    <span>Overview</span>
                </a>
                <a href="profile.html" class="dash-nav-link" data-view="profile">
                    <i class='bx bxs-user-circle'></i>
                    <span>My Profile</span>
                </a>
                <a href="network.html" class="dash-nav-link" data-view="network">
                    <i class='bx bxs-contact'></i>
                    <span>Alumni Network</span>
                </a>

                <span class="nav-section-label">Communication</span>
                <a href="chat.html" class="dash-nav-link" data-view="chat">
                    <i class='bx bxs-message-dots'></i>
                    <span>Messages</span>
                    <span class="nav-badge">3</span>
                </a>
                <a href="notifications.html" class="dash-nav-link" data-view="notifications">
                    <i class='bx bxs-bell-ring'></i>
                    <span>Notifications</span>
                    <span class="nav-badge">5</span>
                </a>

                <span class="nav-section-label">Discover</span>
                <a href="events.html" class="dash-nav-link" data-view="events">
                    <i class='bx bxs-calendar-event'></i>
                    <span>Events</span>
                </a>
                <a href="jobs.html" class="dash-nav-link" data-view="jobs">
                    <i class='bx bxs-briefcase'></i>
                    <span>Job Board</span>
                </a>
                <a href="gallery.html" class="dash-nav-link" data-view="gallery">
                    <i class='bx bxs-photo-album'></i>
                    <span>Gallery</span>
                </a>
                <a href="mentorship.html" class="dash-nav-link active" data-view="mentorship">
                    <i class='bx bxs-user-voice'></i>
                    <span>Mentorship</span>
                </a>

                <span class="nav-section-label">Settings</span>
                <a href="settings.html" class="dash-nav-link" data-view="settings">
                    <i class='bx bxs-cog'></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="dash-sidebar-footer">
                <a href="#" class="dash-nav-link" id="logoutBtn">
                    <i class='bx bx-log-out'></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="dash-main">

            <!-- Topbar -->
            <header class="dash-topbar">
                <div style="display:flex;align-items:center;gap:16px;">
                    <button class="sidebar-toggle" onclick="document.getElementById('dashSidebar').classList.toggle('open')">
                        <i class='bx bx-menu'></i>
                    </button>
                    <div class="dash-search">
                        <i class='bx bx-search'></i>
                        <input type="text" placeholder="Search alumni, events, jobs..." id="dashSearchInput">
                    </div>
                </div>
                <div class="dash-topbar-actions">
                    <button class="topbar-icon-btn" title="Notifications" data-tooltip="Notifications" onclick="navigateTo('notifications')">
                        <i class='bx bxs-bell'></i>

                    <button class="topbar-icon-btn" title="Settings" data-tooltip="Settings" onclick="navigateTo('settings')">

                    </button>
                    <div class="topbar-profile" id="topbarProfile">
                        <img src="https://i.pravatar.cc/150?img=3" alt="Profile">
                        <span>Shubham</span>
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div class="dash-view" id="dashViewContainer" data-page="mentorship">
                <!-- Rendered by dashboard.js -->
            </div>
        </main>
    </div>

    <script src="../../assets/js/data.js"></script>
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
</body>
</html>
